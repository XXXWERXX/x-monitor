name: X-Tweet-Monitor

on:
  schedule:
    # 每5分钟（公开仓库无限额度）
    - cron: '*/5 * * * *'

  workflow_dispatch:
    inputs:
      target:
        description: '临时目标用户名'
        required: false
        default: ''

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Playwright 浏览器缓存路径
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-cache

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 缓存 Playwright 浏览器
        uses: actions/cache@v4
        with:
          path: .playwright-cache
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: 🐦 运行推文监控
        env:
          TARGET_SCREEN_NAME: ${{ secrets.TARGET_SCREEN_NAME }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          X_COOKIES: ${{ secrets.X_COOKIES }}
          VERBOSE: "0"
        run: python main.py

      - name: 提交状态更新
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add monitor_state.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "[skip ci] 更新监控状态"
          git push || true

      - name: ⚠️ 失败通知
        if: failure()
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          python -c "
          import smtplib, os, re
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from datetime import datetime
          sender = os.environ['SENDER_EMAIL']
          pwd = os.environ['SENDER_PASSWORD']
          rcpt = os.environ['RECIPIENT_EMAIL']
          msg = MIMEMultipart('alternative')
          msg['Subject'] = f'[X监控] 运行失败 - {datetime.now().strftime(\"%Y-%m-%d %H:%M\")}'
          msg['From'] = sender
          msg['To'] = rcpt
          msg.attach(MIMEText('GitHub Actions 运行失败，请检查 Actions 日志。', 'plain', 'utf-8'))
          with smtplib.SMTP_SSL('smtp.qq.com', 465, timeout=30) as s:
              s.login(sender, pwd)
              s.send_message(msg)
          print('错误通知已发送')
          "
